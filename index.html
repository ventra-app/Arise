(() => {
  const root = document.getElementById("root");
  let mounted = root.children.length > 0, shown = false;
  new MutationObserver(() => { if (root.children.length) mounted = true; }).observe(root, { childList: true });
  function showRecovery() {
    if (shown || root.children.length) return;
    shown = true;
    const d = document.createElement("div");
    d.dir = "rtl";
    d.style.cssText = "position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#0F5147;color:#fff;font-family:Tahoma,system-ui;text-align:center;padding:24px";

    d.querySelector("button").onclick = () => location.reload();
    document.body.appendChild(d);
  }
  function onFailure() { if (mounted) requestAnimationFrame(showRecovery); }
  addEventListener("error", onFailure);
  addEventListener("unhandledrejection", onFailure);
  addEventListener("load", () => setTimeout(() => { if (!mounted) showRecovery(); }, 6000));
})();
